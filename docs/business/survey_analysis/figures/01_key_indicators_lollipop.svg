<text x="1010" y="120" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#2E5E88" text-anchor="start">55 / 60 (91.7%)</text>
<text x="42" y="182" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#1F2933" text-anchor="start">AI as most common solution method</text>
